data:
  batch_size: 16
  image_size: 224
  normalization: clip
  num_workers: 4
  test_id: data/splits/test_id.jsonl
  test_ood: data/splits/test_ood.jsonl
  train: data/splits/train.jsonl
  val: data/splits/val.jsonl
experiment:
  name: clip_diff_dml
loss:
  name: ce
metrics:
  ece_bins: 15
  threshold: 0.5
model:
  auxiliary:
    dropout: 0.2
    freeze_backbone: true
    name: openai/clip-vit-large-patch14
    num_classes: 2
    num_frozen_blocks: 20
    pretrained: true
    train_layer_norm: true
    type: clip
  primary:
    dropout: 0.2
    freeze_backbone: true
    name: openai/clip-vit-large-patch14
    num_classes: 2
    num_frozen_blocks: 16
    pretrained: true
    train_layer_norm: true
    type: clip
optimizer:
  fused: false
  lr: 0.0001
  lr_backbone: 1.0e-05
  lr_head: 0.0001
  name: adamw
  weight_decay: 0.0001
  weight_decay_head: 1.0e-05
optimizer_aux:
  fused: false
  lr: 1.0e-05
  lr_backbone: 1.0e-06
  lr_head: 1.0e-05
  name: adamw
  weight_decay: 0.0001
  weight_decay_head: 1.0e-05
output_root: outputs
scheduler:
  eta_min: 1.0e-06
  name: cosine
  t_max: 10
scheduler_aux:
  name: none
seed: 42
training:
  accelerator: auto
  checkpoint_metric: val/auc
  checkpoint_mode: max
  devices: auto
  epochs: 2
  kl_weight: 1.0
  lightning_strategy: ddp_find_unused_parameters_true
  log_every_n_steps: 20
  precision: 32-true
  save_top_k: 1
  strategy: diff_dml
  sync_batchnorm: false
  use_distributed_sampler: true
